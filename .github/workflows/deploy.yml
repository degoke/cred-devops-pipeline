name: Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: deploy-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

env:
  AWS_REGION: us-east-1
  AWS_OIDC_ROLE_ARN: arn:aws:iam::623927359054:role/cred-devops-gha-oidc-role
  TF_WORKING_DIR: terraform
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  ENVIRONMENT: production

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  terraform-plan:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Terraform plan
        run: |
          terraform plan -input=false \
            -var "aws_region=${{ env.AWS_REGION }}" \
            -var "environment=${{ env.ENVIRONMENT }}" \
            -var "project_name=${{ github.event.repository.name }}" \
            -var "image_name=${{ env.IMAGE_NAME }}" \
            -var "image_tag=${{ github.sha }}"

  build-and-push:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  terraform-apply:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Terraform apply
        run: |
          terraform apply -input=false -auto-approve \
            -var "aws_region=${{ env.AWS_REGION }}" \
            -var "environment=${{ env.ENVIRONMENT }}" \
            -var "project_name=${{ github.event.repository.name }}" \
            -var "image_name=${{ env.IMAGE_NAME }}" \
            -var "image_tag=${{ github.sha }}"

  deploy:
    needs: terraform-apply
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get ECS details from Terraform
        id: tf
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.ecs_cluster_name }}" \
            --service "${{ steps.tf.outputs.ecs_service_name }}" \
            --force-new-deployment
