name: Deploy

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["Infrastructure"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

env:
  AWS_REGION: us-east-1
  AWS_OIDC_ROLE_ARN: arn:aws:iam::623927359054:role/cred-devops-gha-oidc-role
  TF_WORKING_DIR: terraform
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get ECS details from Terraform
        id: tf
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.ecs_cluster_name }}" \
            --service "${{ steps.tf.outputs.ecs_service_name }}" \
            --force-new-deployment
